<div class="auth-card">
  <h2 class="auth-card-title">{{ 'auth.register' | translate }}</h2>

  <button class="google-btn" (click)="loginWithGoogle()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    {{ 'auth.continueWithGoogle' | translate }}
  </button>

  <div class="divider">
    <span class="divider-line"></span>
    <span class="divider-text">{{ 'auth.orDivider' | translate }}</span>
    <span class="divider-line"></span>
  </div>

  <div class="form-field">
    <label class="form-label">{{ 'auth.name' | translate }}</label>
    <input class="form-input" type="text" [placeholder]="'auth.name' | translate" [ngModel]="name()" (ngModelChange)="name.set($event)" />
  </div>

  <div class="form-field">
    <label class="form-label">{{ 'auth.email' | translate }}</label>
    <input class="form-input" type="email" [placeholder]="'auth.email' | translate" [ngModel]="email()" (ngModelChange)="email.set($event)" />
  </div>

  <div class="form-field">
    <label class="form-label">{{ 'auth.password' | translate }}</label>
    <div class="input-with-action">
      <input class="form-input" [type]="showPassword() ? 'text' : 'password'" [placeholder]="'auth.password' | translate" [ngModel]="password()" (ngModelChange)="password.set($event)" />
      <button class="input-action-btn" type="button" (click)="showPassword.update(v => !v)">
        <span class="material-symbols-rounded">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
      </button>
    </div>
  </div>

  <div class="form-field">
    <label class="form-label">{{ 'auth.birthdate' | translate }}</label>
    <input class="form-input" type="date" [ngModel]="birthdate()" (ngModelChange)="birthdate.set($event)" />
  </div>

  <button class="submit-btn" (click)="onSubmit()" [disabled]="!email() || !password() || !name() || isLoading()">
    @if (isLoading()) {
      <span class="spinner-sm"></span>
    }
    {{ 'auth.register' | translate }}
  </button>

  <p class="auth-switch">
    {{ 'auth.hasAccount' | translate }}
    <a routerLink="/auth/login" class="auth-switch-link">{{ 'auth.signInHere' | translate }}</a>
  </p>

  <p class="auth-terms">
    {{ 'auth.agreeTerms' | translate }}
    <a class="auth-terms-link">{{ 'auth.terms' | translate }}</a>
    {{ 'common.and' | translate }}
    <a class="auth-terms-link">{{ 'auth.privacy' | translate }}</a>.
  </p>
</div>
