@if (href(); as link) {
  <a
    [class]="classes()"
    [class.bui-button--loading]="isLoading()"
    [class.bui-button--selected]="isSelected()"
    [class.bui-button--disabled]="disabled()"
    [attr.href]="disabled() ? null : link"
    [attr.aria-disabled]="disabled() ? 'true' : null"
    [attr.aria-pressed]="isSelected() ? 'true' : null"
    [style.background-color]="colors()?.backgroundColor || null"
    [style.color]="colors()?.color || null"
    (click)="onClick($event)"
  >
    <ng-container [ngTemplateOutlet]="content" />
  </a>
} @else {
  <button
    [class]="classes()"
    [class.bui-button--loading]="isLoading()"
    [class.bui-button--selected]="isSelected()"
    [attr.type]="type()"
    [disabled]="disabled()"
    [attr.aria-busy]="isLoading() ? 'true' : null"
    [attr.aria-pressed]="isSelected() ? 'true' : null"
    [style.background-color]="colors()?.backgroundColor || null"
    [style.color]="colors()?.color || null"
    (click)="onClick($event)"
  >
    <ng-container [ngTemplateOutlet]="content" />
  </button>
}

<ng-template #content>
  @if (isLoading()) {
    <span class="bui-button__spinner" aria-hidden="true"></span>
  }
  <span class="bui-button__start"><ng-content select="[buiStartEnhancer]" /></span>
  <span class="bui-button__label"><ng-content /></span>
  <span class="bui-button__end"><ng-content select="[buiEndEnhancer]" /></span>
</ng-template>
