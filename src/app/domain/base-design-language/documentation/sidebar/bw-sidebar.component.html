<nav class="bdl-sidebar__nav" aria-label="Documentation">
  @for (category of nav(); track category.label) {
    <div class="bdl-sidebar__cat">
      <span class="bdl-sidebar__cat-label">{{ category.label }}</span>
      @for (group of category.groups; track group.label) {
        @if (group.label !== category.label) {
          <span class="bdl-sidebar__group-label">{{ group.label }}</span>
        }
        <ul class="bdl-sidebar__list">
          @for (item of group.items; track item.path) {
            <li>
              <a
                class="bdl-sidebar__link"
                [routerLink]="link(item.path)"
                routerLinkActive="bdl-sidebar__link--active"
                [routerLinkActiveOptions]="{ exact: item.path === '' }"
              >{{ item.label }}</a>
            </li>
          }
        </ul>
      }
    </div>
  } @empty {
    <p class="bdl-sidebar__empty">No results.</p>
  }
</nav>
