<div class="bdl-topbar__left">
  <button type="button" class="bdl-topbar__icon-btn bdl-topbar__menu" aria-label="Toggle navigation" (click)="toggleSidebar.emit()">
    <span class="material-symbols-rounded" aria-hidden="true">menu</span>
  </button>

  <a class="bdl-topbar__brand" [routerLink]="homeLink" aria-label="Base Web">
    <span class="bdl-topbar__logo" aria-hidden="true">◆</span>
    <span class="bdl-topbar__word">
      <span class="bdl-topbar__word-base">Base</span>
      <span class="bdl-topbar__word-web">Web</span>
    </span>
  </a>

  <button type="button" class="bdl-topbar__version">
    {{ version }}
    <span class="material-symbols-rounded" aria-hidden="true">expand_more</span>
  </button>

  <nav class="bdl-topbar__nav" aria-label="Primary">
    <a class="bdl-topbar__navlink" [routerLink]="blogLink">Blog</a>
    <a class="bdl-topbar__navlink" [routerLink]="ladleLink">Components</a>
  </nav>
</div>

<div class="bdl-topbar__right">
  <div class="bdl-topbar__search">
    <span class="material-symbols-rounded bdl-topbar__search-icon" aria-hidden="true">search</span>
    <input
      type="search"
      class="bdl-topbar__search-input"
      placeholder="Search documentation"
      aria-label="Search documentation"
      (input)="onInput($event)"
    />
  </div>
  <a class="bdl-topbar__icon-btn" href="https://github.com/uber/baseweb" target="_blank" rel="noopener" aria-label="GitHub">
    <span class="material-symbols-rounded" aria-hidden="true">code</span>
  </a>
  <button type="button" class="bdl-topbar__icon-btn" aria-label="Menu" >
    <span class="material-symbols-rounded" aria-hidden="true">menu_open</span>
  </button>
  <button
    type="button"
    class="bdl-topbar__theme"
    [class.bdl-topbar__theme--dark]="mode() === 'dark'"
    [attr.aria-label]="mode() === 'dark' ? 'Light theme' : 'Dark theme'"
    (click)="toggleMode.emit()"
  ></button>
</div>
