<bdl-doc-page
  category="Components · Content"
  title="Accordion"
  lead="Accordions exibem seções de conteúdo colapsáveis. Cada Panel tem header com chevron e conteúdo animado."
>
  <bdl-yard [controls]="controls" [code]="codeFn" [themeCode]="themeCode">
    <ng-template #preview let-s>
      <bui-accordion style="width: 100%">
        <bui-panel [title]="s.title" [initialExpanded]="s.initialExpanded" [disabled]="s.disabled">
          Panel content
        </bui-panel>
      </bui-accordion>
    </ng-template>
  </bdl-yard>

  <bdl-doc-section title="Basic" description="Vários panels independentes; clique no header para expandir/colapsar.">
    <bdl-doc-example>
      <bui-accordion style="width: 100%">
        <bui-panel title="Accordion panel 1">panel 1</bui-panel>
        <bui-panel title="Accordion panel 2">panel 2</bui-panel>
        <bui-panel title="Accordion panel 3">panel 3</bui-panel>
      </bui-accordion>
    </bdl-doc-example>
  </bdl-doc-section>

  <bdl-doc-section title="Expanded" description="Controlado (expanded) ou inicial não-controlado (initialExpanded).">
    <bdl-doc-example>
      <bui-accordion style="width: 100%">
        <bui-panel title="Default panel">collapsed</bui-panel>
        <bui-panel title="Expanded (controlled)" [expanded]="true">always open</bui-panel>
        <bui-panel title="Initial expanded" [initialExpanded]="true">starts open</bui-panel>
      </bui-accordion>
    </bdl-doc-example>
  </bdl-doc-section>

  <bdl-doc-section title="Disabled">
    <bdl-doc-example>
      <bui-accordion style="width: 100%">
        <bui-panel title="Enabled">content</bui-panel>
        <bui-panel title="Disabled" [disabled]="true">content</bui-panel>
      </bui-accordion>
    </bdl-doc-example>
  </bdl-doc-section>

  <bdl-doc-section title="Angular API" description="Panel: title, expanded (controlado), initialExpanded, disabled, (expandedChange).">
    <bdl-doc-example>
      <span style="font: var(--bw-font-ParagraphSmall); color: var(--bw-content-secondary)">
        &lt;bui-accordion&gt; &lt;bui-panel title="…" [initialExpanded]="false" [disabled]="false"&gt;…&lt;/bui-panel&gt; &lt;/bui-accordion&gt;
      </span>
    </bdl-doc-example>
  </bdl-doc-section>
</bdl-doc-page>
