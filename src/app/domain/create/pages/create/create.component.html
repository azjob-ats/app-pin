<app-card-board>
  <app-card-container>
    <app-card-header>
      <app-card-section-left>
        {{ 'create.title' | translate }}
      </app-card-section-left>
      <app-card-section-right>
        <app-button variant="secondary" size="md">
          {{ 'create.draft' | translate }}
        </app-button>
        <app-button
          variant="primary"
          size="md"
          [loading]="isPublishing()"
          [disabled]="!previewUrl()"
          (clicked)="publish()"
        >{{ 'create.publish' | translate }}</app-button>
      </app-card-section-right>
    </app-card-header>
    <app-card-body>
      <!-- ── Upload area ─────────────────────────────────────── -->
      <div class="create-upload-side flex align-stretch">
        <app-upload-area
          [previewUrl]="previewUrl()"
          (fileSelected)="onFileSelected($event)"
          (fileRemoved)="onFileRemoved()"
        />
      </div>
      <!-- ── Form ────────────────────────────────────────────── -->
      <div class="create-form-side flex flex-col flex-1 p-2xl gap-xl">
        <app-input
          type="text"
          [label]="'create.pinTitle' | translate"
          [placeholder]="'create.pinTitle' | translate"
          [ngModel]="title()"
          (ngModelChange)="title.set($event)"
        />
        <div class="flex flex-col gap-xs">
          <label class="text-sm fw-bold">{{ 'create.description' | translate }}</label>
          <textarea
            class="form-textarea"
            [placeholder]="'create.description' | translate"
            [ngModel]="description()"
            (ngModelChange)="description.set($event)"
            rows="4"
            maxlength="500"
          ></textarea>
        </div>
        <app-input
          type="url"
          [label]="'create.link' | translate"
          placeholder="https://"
          [ngModel]="link()"
          (ngModelChange)="link.set($event)"
        />
        <app-input
          type="text"
          [label]="'create.altText' | translate"
          [placeholder]="'create.altText' | translate"
          hint="Add alt text for accessibility"
          [ngModel]="altText()"
          (ngModelChange)="altText.set($event)"
        />
        <div class="flex flex-col gap-xs">
          <label class="text-sm fw-bold">{{ 'create.selectBoard' | translate }}</label>
          <select class="form-select" [ngModel]="selectedBoardId()" (ngModelChange)="selectedBoardId.set($event)">
            @for (board of boards(); track board.id) {
              <option [value]="board.id">{{ board.name }}</option>
            }
          </select>
        </div>
      </div>
    </app-card-body>
  </app-card-container>
</app-card-board>
