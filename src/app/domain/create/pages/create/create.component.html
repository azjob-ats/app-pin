<app-card-board>
  <app-card-container>
    <app-card-header>
      <app-card-section-left>
        {{ 'create.title' | translate }}
      </app-card-section-left>
      <app-card-section-right>
        <app-button variant="secondary" size="md">
          {{ 'create.draft' | translate }}
        </app-button>
        <app-button
          variant="primary"
          size="md"
          [loading]="isPublishing()"
          [disabled]="!previewUrl()"
          (clicked)="publish()"
        >{{ 'create.publish' | translate }}</app-button>
      </app-card-section-right>
    </app-card-header>
    <app-card-body>
      <!-- ── Upload area ─────────────────────────────────────── -->
      <div class="create-upload-side flex align-stretch">
        <app-upload-area
          [previewUrl]="previewUrl()"
          (fileSelected)="onFileSelected($event)"
          (fileRemoved)="onFileRemoved()"
        />
      </div>
      <!-- ── Form ────────────────────────────────────────────── -->
      <div class="create-form-side flex flex-col flex-1 p-6 gap-5">
        <app-input
          type="text"
          [label]="'create.pinTitle' | translate"
          [placeholder]="'create.pinTitle' | translate"
          [ngModel]="title()"
          (ngModelChange)="title.set($event)"
        />
        <app-textarea
          [label]="'create.description' | translate"
          [placeholder]="'create.description' | translate"
          [rows]="4"
          [maxlength]="500"
          [ngModel]="description()"
          (ngModelChange)="description.set($event)"
        />
        <app-input
          type="url"
          [label]="'create.link' | translate"
          placeholder="https://"
          [ngModel]="link()"
          (ngModelChange)="link.set($event)"
        />
        <app-input
          type="text"
          [label]="'create.altText' | translate"
          [placeholder]="'create.altText' | translate"
          hint="Add alt text for accessibility"
          [ngModel]="altText()"
          (ngModelChange)="altText.set($event)"
        />
        <app-select
          [label]="'create.selectBoard' | translate"
          [options]="boards()"
          [ngModel]="selectedBoardId()"
          (ngModelChange)="selectedBoardId.set($event)"
        />
      </div>
    </app-card-body>
  </app-card-container>
</app-card-board>
