<div class="create-page">
  <div class="create-container">

    <div class="create-header">
      <h1 class="create-title">{{ 'create.title' | translate }}</h1>
      <div class="create-header-actions">
        <app-button variant="secondary" size="md">
          {{ 'create.draft' | translate }}
        </app-button>
        <app-button
          variant="primary"
          size="md"
          [loading]="isPublishing()"
          [disabled]="!previewUrl()"
          (clicked)="publish()"
        >{{ 'create.publish' | translate }}</app-button>
      </div>
    </div>

    <div class="create-body">

      <!-- ── Upload area ─────────────────────────────────────── -->
      <div class="create-upload-side">
        <app-upload-area
          [previewUrl]="previewUrl()"
          (fileSelected)="onFileSelected($event)"
          (fileRemoved)="onFileRemoved()"
        />
      </div>

      <!-- ── Form ────────────────────────────────────────────── -->
      <div class="create-form-side">

        <app-input
          type="text"
          [label]="'create.pinTitle' | translate"
          [placeholder]="'create.pinTitle' | translate"
          [ngModel]="title()"
          (ngModelChange)="title.set($event)"
        />

        <div class="form-field">
          <label class="form-label">{{ 'create.description' | translate }}</label>
          <textarea
            class="form-textarea"
            [placeholder]="'create.description' | translate"
            [ngModel]="description()"
            (ngModelChange)="description.set($event)"
            rows="4"
            maxlength="500"
          ></textarea>
        </div>

        <app-input
          type="url"
          [label]="'create.link' | translate"
          placeholder="https://"
          [ngModel]="link()"
          (ngModelChange)="link.set($event)"
        />

        <app-input
          type="text"
          [label]="'create.altText' | translate"
          [placeholder]="'create.altText' | translate"
          hint="Add alt text for accessibility"
          [ngModel]="altText()"
          (ngModelChange)="altText.set($event)"
        />

        <div class="form-field">
          <label class="form-label">{{ 'create.selectBoard' | translate }}</label>
          <select class="form-select" [ngModel]="selectedBoardId()" (ngModelChange)="selectedBoardId.set($event)">
            @for (board of boards(); track board.id) {
              <option [value]="board.id">{{ board.name }}</option>
            }
          </select>
        </div>

      </div>
    </div>
  </div>
</div>
