<section class="empresa-container panel-products" aria-labelledby="panel-products-title">
  <app-empresa-page-header
    eyebrow="Gerenciar"
    title="Produtos"
    subtitle="Publique Vagas, Produtos, Treinamentos, Notícias e Experiências. Arraste cards entre as fases para controlar a visibilidade pública."
  >
    <button
      type="button"
      class="empresa-btn empresa-btn--ghost"
      (click)="openNewPhaseModal()"
    >
      <span class="material-symbols-rounded" aria-hidden="true">add</span>
      Nova fase
    </button>
  </app-empresa-page-header>

  <nav class="emp-chip-row" role="tablist" aria-label="Filtrar por tipo de produto">
    @for (tab of typeTabs(); track tab.value) {
      <button
        type="button"
        role="tab"
        class="emp-chip"
        [class.is-active]="typeFilter() === tab.value"
        [attr.aria-selected]="typeFilter() === tab.value"
        (click)="setTypeFilter(tab.value)"
      >
        <span class="material-symbols-rounded emp-chip__icon" aria-hidden="true">
          {{ tab.icon }}
        </span>
        <span>{{ tab.label }}</span>
        <span class="emp-chip__count">{{ countByType()[tab.value] }}</span>
      </button>
    }
  </nav>

  @if (error(); as message) {
    <div class="panel-products__error" role="alert">
      <span class="material-symbols-rounded" aria-hidden="true">error_outline</span>
      <p>{{ message }}</p>
    </div>
  }

  @if (isLoading() && filteredItems().length === 0) {
    <div class="panel-products__loading" role="status" aria-live="polite">
      <div class="panel-products__loading-bar"></div>
      <p>Carregando produtos…</p>
    </div>
  } @else {
    <app-kanban-board
      [columns]="columns()"
      [items]="filteredItems()"
      [itemColumnKey]="getColumnKey"
      [itemId]="getItemId"
      [cardTemplate]="cardTpl"
      [canAddPhase]="true"
      [canCreateInPhase]="canCreateInPhase"
      [isMovingItem]="isMovingItem"
      (itemMoved)="onItemMoved($event)"
      (addPhaseRequested)="openNewPhaseModal()"
      (createInPhaseRequested)="onCreateInPhase($event)"
      (itemClicked)="onProductClicked($event)"
    />
  }

  <ng-template #cardTpl let-product>
    <app-product-card [product]="product" />
  </ng-template>

  @if (showNewPhaseModal()) {
    <div
      class="panel-products__modal-backdrop"
      role="presentation"
      (click)="closeNewPhaseModal()"
    >
      <div
        class="panel-products__modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="new-phase-title"
        (click)="$event.stopPropagation()"
      >
        <header class="panel-products__modal-header">
          <div>
            <span class="panel-products__modal-eyebrow">Configuração</span>
            <h3 id="new-phase-title" class="panel-products__modal-title">Nova fase</h3>
          </div>
          <button
            type="button"
            class="panel-products__modal-close"
            aria-label="Fechar"
            (click)="closeNewPhaseModal()"
          >
            <span class="material-symbols-rounded" aria-hidden="true">close</span>
          </button>
        </header>

        <form
          class="panel-products__modal-form"
          [formGroup]="newPhaseForm"
          (ngSubmit)="submitNewPhase()"
          novalidate
        >
          <div class="panel-products__field">
            <label for="new-phase-label">Nome da fase</label>
            <input
              id="new-phase-label"
              type="text"
              formControlName="label"
              placeholder="Ex.: Em análise jurídica"
              autocomplete="off"
              autofocus
            />
          </div>

          <div class="panel-products__field">
            <label for="new-phase-color">Cor identificadora</label>
            <input id="new-phase-color" type="color" formControlName="color" />
          </div>

          <footer class="panel-products__modal-footer">
            <button
              type="button"
              class="empresa-btn empresa-btn--quiet"
              (click)="closeNewPhaseModal()"
            >
              Cancelar
            </button>
            <button
              type="submit"
              class="empresa-btn empresa-btn--primary"
              [disabled]="newPhaseForm.invalid"
            >
              Criar fase
            </button>
          </footer>
        </form>
      </div>
    </div>
  }
</section>
