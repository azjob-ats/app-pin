<div class="daily-story-scroll">
  <div class="daily-story-track" #storyTrack>
    @if (isLoading()) {
      @for (i of skeletonItems; track i) {
        <div class="skeleton-story">
          <div class="skeleton-story-cover"></div>
          <div class="skeleton-story-info">
            <div class="skeleton-story-title"></div>
            <div class="skeleton-story-count"></div>
          </div>
        </div>
      }
    } @else {
      @for (bundle of bundles(); track bundle.id) {
        <app-polaroid-photo-card [bundle]="bundle" [rotate]="true" />
      }
    }
  </div>
</div>
