<div class="media-card-feed">
  <!--@if (selectedCategory() !== 'all') {
    <h2 class="feed-title text-5 fw-bold text-1xl-title px-4 mb-4">{{ selectedCategory() }}</h2>
  } @else {
    <h2 class="feed-title text-5 fw-bold text-1xl-title px-4 mb-4">
      {{ 'explore.trending' | translate }}
    </h2>
  }-->

  @if (isLoading()) {
    <app-skeleton-loader [count]="12" />
  } @else {
    <div class="post-grid">
      @for (item of feedItems(); track item.data.id) {
        @switch (item.kind) {
          @case ('post') {
            <app-pin-card-player-short [post]="item.data" [uniformAspect]="true" />
          }
          @case ('winning-slot') {
            <app-winning-slot-card [slot]="item.data" />
          }
        }
      }
    </div>
    <app-infinite-scroll [loading]="isLoadingMore()" (loadMore)="loadMore.emit()" />
  }
</div>
