<div class="media-card-feed py-4">
  @if (selectedCategory() !== 'all') {
    <h2 class="feed-title text-5 fw-bold text-1xl-title px-4 mb-4">{{ selectedCategory() }}</h2>
  } @else {
    <h2 class="feed-title text-5 fw-bold text-1xl-title px-4 mb-4">
      {{ 'explore.trending' | translate }}
    </h2>
  }

  @if (isLoading()) {
    <app-skeleton-loader [count]="12" />
  } @else {
    <div class="post-grid">
      @for (item of feedItems(); track item.kind === 'post' ? item.data.id : item.data.id) {
        @if (item.kind === 'post') {
          <app-pin-card-player-short [post]="item.data" />
        } @else {
          <app-collection-bundle
            [bundle]="item.data"
            (click)="openCollection.emit(item.data)" />
        }
      }
    </div>
    <app-infinite-scroll [loading]="isLoadingMore()" (loadMore)="loadMore.emit()" />
  }
</div>
