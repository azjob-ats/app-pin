<div class="explore-page">
  <!-- suggestions -->
  <div class="suggestions-conteiner mt-lg">
    <div class="search-suggestions">
      <div class="suggestions-grid">
        @for (term of popularSearches; track term) {
        <button class="suggestion-chip" (click)="search(term)">
          <span class="material-symbols-rounded">trending_up</span>
          {{ term }}
        </button>
        }
      </div>
    </div>
  </div>

  <div class="boards-grid">
    @for (board of boards(); track board.id) {
      <app-board-card [board]="board" />
    }
  </div>

  <!-- Filtros campeão e constomizados pelo usuario-->
  <app-chip-scroll [chips]="chipItems()" [selected]="selectedCategory()" (chipSelect)="selectCategory($event)" />

  <!-- Pins feed -->
  <div class="explore-feed">
    @if (selectedCategory() !== 'all') {
    <h2 class="feed-title">{{  selectedCategory() }}</h2>
    } @else {
    <h2 class="feed-title">{{ 'explore.trending' | translate }}</h2>
    }

    @if (isLoading()) {
    <app-skeleton-loader [count]="20" />
    } @else {
    <app-masonry-grid [pins]="pins()" />
    <app-infinite-scroll [loading]="isLoadingMore()" (loadMore)="onLoadMore()" />
    }
  </div>
</div>
