<div class="search-page">
  <!-- Categories scroll bar -->
  <app-chip-scroll-text
    [chips]="chipItems()"
    [selected]="selectedCategory()"
    (chipSelect)="selectCategory($event)" />

  <!-- Results -->
  @if (query()) {
    <div class="py-4">
      @if (isLoading()) {
        <app-skeleton-loader [count]="20" />
      } @else if (pins().length === 0) {
        <app-empty-state
          icon="search_off"
          [message]="'search.noResults' | translate"
          [subtitle]="query()" />
      } @else {
        <app-masonry-grid [pins]="pins()" />
        <app-infinite-scroll
          [loading]="isLoadingMore()"
          (loadMore)="onLoadMore()" />
      }
    </div>
  }
</div>
