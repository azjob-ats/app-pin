<div class="search-page">
  <!-- Dynamic filter menu: categories + attribute panel -->
  <app-search-filter-menu
    [catalogs]="catalogs()"
    [resultCount]="resultCount()"
    (catalogSelect)="onCatalogSelected($event)"
    (filterChange)="onFilterChange($event)"
  />

  <!-- Results -->
  @if (query()) {
    <div class="py-4">
      @if (isLoading()) {
        <app-skeleton-loader [count]="20" />
      } @else if (posts().length === 0) {
        <app-empty-state
          icon="search_off"
          [message]="'search.noResults' | translate"
          [subtitle]="query()" />
      } @else {
        <div class="post-grid">
          @for (post of posts(); track post.id) {
            <app-pin-card-player-short [post]="post" />
          }
        </div>
        <app-infinite-scroll
          [loading]="isLoadingMore()"
          (loadMore)="onLoadMore()" />
      }
    </div>
  }
</div>
