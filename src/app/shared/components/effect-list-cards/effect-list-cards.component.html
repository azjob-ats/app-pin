<div class="effect-cards" #container>
  <div class="effect-cards__stack">
    @for (item of items(); track $index) {
      <div
        class="effect-cards__card"
        [class.effect-cards__card--active]="getVisualIndex($index) === 0"
        [class.effect-cards__card--dragging]="isDragging() && getVisualIndex($index) === 0"
        [class.effect-cards__card--rising]="isCardRising(getVisualIndex($index))"
        [style.transform]="getCardTransform(getVisualIndex($index))"
        [style.z-index]="getCardZIndex(getVisualIndex($index))"
        [style.opacity]="getCardOpacity(getVisualIndex($index))"
        [style.transition]="getCardTransition(getVisualIndex($index))"
        [style.box-shadow]="getCardShadow(getVisualIndex($index))"
        (pointerdown)="getVisualIndex($index) === 0 ? onPointerDown($event) : null"
      >
        <img
          class="effect-cards__image"
          [src]="item.thumbnailUrl"
          [alt]="'Card ' + ($index + 1)"
          draggable="false"
        />
      </div>
    }
  </div>

  <div class="effect-cards__pagination" role="tablist" aria-label="Card navigation">
    @for (item of items(); track $index) {
      <button
        class="effect-cards__dot"
        [class.effect-cards__dot--active]="activeIndex() === $index"
        type="button"
        role="tab"
        [attr.aria-selected]="activeIndex() === $index"
        [attr.aria-label]="'Card ' + ($index + 1)"
        (click)="goToCard($index)"
      ></button>
    }
  </div>

  <div class="effect-cards__footer">
    @if (activeItem().title) {
      <button
        type="button"
        class="effect-cards__title"
        (click)="onTitleClick()"
      >{{ activeItem().title }}</button>
    }
    <div class="effect-cards__channel">
      @if (media().channel.profilePicture) {
        <img
          class="effect-cards__channel-avatar"
          [src]="media().channel.profilePicture"
          [alt]="media().channel.profileNameOfficial"
          loading="lazy"
        />
      }
      <span class="effect-cards__channel-name">{{ media().channel.profileNameOfficial }}</span>
      @if (media().channel.verified) {
        <span
          class="effect-cards__verified material-symbols-rounded"
          aria-label="Verified account">
          verified
        </span>
      }
    </div>
  </div>
</div>
