<div
  class="pin-card"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
>
  <a [routerLink]="['/pin', pin().id]" class="pin-image-link">

    <!-- Skeleton while loading -->
    @if (!isImageLoaded()) {
      <div class="pin-skeleton" [style.aspect-ratio]="(pin().imageWidth || 400) + '/' + (pin().imageHeight || 600)"></div>
    }

    <!-- Image -->
    <img
      class="pin-image"
      [src]="pin().imageUrl"
      [alt]="pin().title || ('pin.noTitle' | translate)"
      loading="lazy"
      (load)="onImageLoad()"
      [class.loaded]="isImageLoaded()"
      [style.aspect-ratio]="(pin().imageWidth || 400) + '/' + (pin().imageHeight || 600)"
    />

    <!-- Hover overlay -->
    @if (isHovered()) {
      <div class="pin-overlay">
        <!-- Top actions -->
        <div class="pin-overlay-top">
          <!-- Save button -->
          <button
            class="pin-save-btn"
            [class.saved]="isSaved() || pin().isSaved"
            (click)="onSave($event)"
          >
            {{ (isSaved() || pin().isSaved) ? ('pin.saved' | translate) : ('pin.save' | translate) }}
          </button>

          <!-- More options -->
          <button class="pin-icon-btn" (click)="$event.preventDefault(); $event.stopPropagation()">
            <span class="material-symbols-rounded">more_horiz</span>
          </button>
        </div>

        <!-- Bottom actions -->
        <div class="pin-overlay-bottom">
          @if (pin().link) {
            <a
              class="pin-link-chip"
              [href]="pin().link"
              target="_blank"
              rel="noopener noreferrer"
              (click)="$event.stopPropagation()"
            >
              <span class="material-symbols-rounded">link</span>
              <span class="pin-link-text">{{ pin().link | slice:0:30 }}{{ (pin().link?.length ?? 0) > 30 ? '...' : '' }}</span>
            </a>
          }

          <button class="pin-icon-btn pin-share-btn" (click)="onShare($event)">
            <span class="material-symbols-rounded">share</span>
          </button>
        </div>
      </div>
    }
  </a>

  <!-- Pin footer -->
  @if (pin().title || pin().author) {
    <div class="pin-footer">
      @if (pin().title) {
        <p class="pin-title">{{ pin().title }}</p>
      }
      <div class="pin-author">
        @if (pin().author.avatarUrl) {
          <img
            class="pin-author-avatar"
            [src]="pin().author.avatarUrl"
            [alt]="pin().author.displayName"
            loading="lazy"
          />
        }
        <span class="pin-author-name">{{ pin().author.displayName }}</span>
      </div>
    </div>
  }
</div>
